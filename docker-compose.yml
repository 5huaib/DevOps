version: '3.8'
services:
  db:
    image: postgres:15-alpine
    container_name: forgeci-postgres
    environment:
      POSTGRES_USER: forgeci_user
      POSTGRES_PASSWORD: forgeci_password
      POSTGRES_DB: forgeci
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data:
